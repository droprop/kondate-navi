name: Check PDF Update

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 * * *' # 毎日 00:00 UTC (日本時間 09:00) に実行
  workflow_dispatch:
    inputs:
      force:
        description: 'フォルダが存在しても強制的に通知を送る'
        required: false
        type: boolean
        default: false
      test_line:
        description: '【テスト用】サイトの状態に関わらず、今すぐLINEにテスト通知を送る'
        required: false
        type: boolean
        default: false

jobs:
  check-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run check script
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FLAGS="$FLAGS --force"
          fi
          if [ "${{ github.event.inputs.test_line }}" = "true" ]; then
            FLAGS="$FLAGS --test-line"
          fi
          python src/check_update.py $FLAGS
